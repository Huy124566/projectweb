<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TicketMaster - Select Seats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        
        /* Header */
        .header { background: #0d5bd7; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; text-decoration: none; cursor: pointer; }
        .logo i { margin-right: 8px; }
        .user-menu { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 40px; cursor: pointer; color: white; }
        .avatar-sm { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        
        .dropdown-menu-custom { position: absolute; right: 40px; top: 70px; width: 260px; background: white; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: none; z-index: 1000; }
        .menu-item { padding: 12px 18px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover { background: #f5f5f5; }
        .logout { color: #dc3545; }
        
        .container-custom { max-width: 1400px; margin: 80px auto 40px; padding: 0 30px; }
        
        /* Event Card */
        .event-card { background: white; border-radius: 28px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 35px rgba(0,0,0,0.08); }
        .event-image { width: 100%; height: 240px; object-fit: cover; }
        .event-info { padding: 25px 35px; }
        .event-title { font-size: 1.8rem; font-weight: 800; color: #1a2a3a; margin-bottom: 12px; }
        .event-category { display: inline-block; background: #e8f0fe; color: #0d5bd7; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; }
        .event-details { display: flex; flex-wrap: wrap; gap: 20px; margin: 15px 0; color: #6c7a8a; }
        .event-details i { width: 20px; color: #0d5bd7; margin-right: 8px; }
        .event-description { color: #4a5a6a; line-height: 1.6; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eef2f6; }
        
        /* Event Component Wrapper */
        .event-component-wrapper {
            width: 100%;
            min-height: 260px;
            background: linear-gradient(135deg, #0a0a2a 0%, #0d1b2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .event-component-wrapper match-info {
            display: block;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }
        
        /* Seat Wrapper */
        .seat-wrapper { 
            background: white; 
            border-radius: 28px; 
            padding: 30px; 
            margin-top: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08); 
        }
        
        .screen { 
            background: linear-gradient(180deg, #1a2a3a 0%, #2a3a4a 100%); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            border-radius: 20px 20px 8px 8px; 
            margin-bottom: 25px; 
            font-weight: 600; 
            letter-spacing: 4px;
            font-size: 14px;
        }
        
        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eef2f6;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #6c7a8a;
        }
        .legend-box {
            width: 24px;
            height: 24px;
            border-radius: 8px;
        }
        .legend-box.available { background: #e0e7ff; border: 2px solid #0d5bd7; }
        .legend-box.vip { background: #fde68a; border: 2px solid #d97706; }
        .legend-box.locked { background: #fed7aa; border: 2px solid #ea580c; }
        .legend-box.locked-by-me { background: #fde68a; border: 2px solid #d97706; }
        .legend-box.sold { background: #e2e8f0; border: 2px solid #94a3b8; }
        
        /* Seat Grid */
        .seat-grid { display: flex; flex-direction: column; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .seat-row { display: flex; justify-content: center; gap: 8px; flex-wrap: nowrap; }
        .row-label { 
            width: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            color: #0d5bd7; 
            background: #e8f0fe; 
            border-radius: 10px; 
            margin-right: 8px;
            font-size: 13px;
        }
        
        /* Seat Styles */
        .seat { 
            width: 52px; 
            height: 52px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            position: relative;
        }
        .seat i { 
            font-size: 18px; 
            transition: all 0.2s;
        }
        .seat span {
            display: none;
            font-weight: 700;
        }
        .seat:hover i {
            display: none;
        }
        .seat:hover span {
            display: block;
        }
        
        .seat.available { 
            background: #e0e7ff; 
            border: 2px solid #0d5bd7; 
            color: #0d5bd7; 
        }
        .seat.available:hover { 
            transform: scale(1.08); 
            background: #0d5bd7; 
            color: white; 
        }
        
        .seat.vip { 
            background: #fde68a; 
            border: 2px solid #d97706; 
            color: #92400e; 
        }
        .seat.vip:hover { 
            transform: scale(1.08); 
            background: #d97706; 
            color: white; 
        }
        
        .seat.locked { 
            background: #fed7aa; 
            border: 2px solid #ea580c; 
            color: #9a3412; 
            cursor: not-allowed; 
            opacity: 0.7;
        }
        
        .seat.locked-by-me { 
            background: #fde68a; 
            border: 2px solid #d97706; 
            color: #92400e;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        .seat.locked-by-me:hover { 
            transform: scale(1.05);
            background: #fbbf24;
        }
        
        .seat.sold { 
            background: #e2e8f0; 
            border: 2px solid #94a3b8; 
            color: #64748b; 
            cursor: not-allowed; 
            opacity: 0.5;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(217, 119, 6, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 119, 6, 0); }
        }
        
        /* Cart Panel */
        .cart-panel { 
            background: white; 
            border-radius: 24px; 
            padding: 24px; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.08); 
            position: sticky; 
            top: 100px; 
        }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eef2f6; }
        .cart-header h5 { margin: 0; font-weight: 700; }
        .cart-items { max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        
        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.5;
        }
        .cart-empty i {
            font-size: 48px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .cart-empty p {
            color: #64748b;
            margin-bottom: 5px;
        }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef2f6; }
        .cart-item-info { flex: 1; }
        .cart-item-seat { font-weight: 700; color: #1a2a3a; }
        .cart-timer { font-size: 11px; color: #dc2626; margin-top: 4px; font-weight: 600; }
        .cart-timer i { margin-right: 4px; }
        .cart-item-price { color: #0d5bd7; font-weight: 600; }
        .cart-item-actions button { background: none; border: none; color: #dc3545; cursor: pointer; margin-left: 10px; font-size: 14px; transition: 0.2s; }
        .cart-item-actions button:hover { transform: scale(1.1); }
        
        .cart-total { padding-top: 15px; border-top: 2px solid #eef2f6; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .grand-total { font-size: 1.2rem; font-weight: 800; color: #0d5bd7; }
        .btn-checkout { background: #0d5bd7; color: white; border: none; padding: 14px; border-radius: 50px; font-weight: 700; width: 100%; transition: 0.2s; }
        .btn-checkout:hover { background: #0a4ab3; transform: translateY(-2px); }
        .btn-checkout:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
        .btn-clear-cart { background: none; border: none; color: #dc3545; font-size: 13px; transition: 0.2s; }
        .btn-clear-cart:hover { text-decoration: underline; }
        
        .loading-spinner { text-align: center; padding: 60px; }
        .spinner { width: 50px; height: 50px; border: 3px solid #e2e8f0; border-top-color: #0d5bd7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-notification { position: fixed; bottom: 30px; right: 30px; color: white; padding: 14px 28px; border-radius: 50px; z-index: 2000; animation: slideIn 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Error container */
        .error-container { text-align: center; padding: 60px 20px; }
        .error-container i { font-size: 48px; margin-bottom: 20px; }
        
        @media (max-width: 992px) { 
            .seat { width: 45px; height: 45px; } 
            .row-label { width: 35px; } 
        }
        @media (max-width: 768px) { 
            .seat { width: 40px; height: 40px; font-size: 11px; }
            .seat i { font-size: 14px; }
            .event-title { font-size: 1.3rem; } 
            .container-custom { margin: 60px auto 30px; padding: 0 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'"><i class="fas fa-ticket-alt"></i> ticketmaster</div>
    <div id="auth-area"></div>
</div>

<div class="container-custom">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="event-card" id="eventCard">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
            <div class="seat-wrapper">
                <div class="screen"><i class="fas fa-film me-2"></i> SCREEN</div>
                <div class="legend">
                    <div class="legend-item"><div class="legend-box available"></div><span>Available</span></div>
                    <div class="legend-item"><div class="legend-box vip"></div><span>VIP</span></div>
                    <div class="legend-item"><div class="legend-box locked"></div><span>Locked (Other)</span></div>
                    <div class="legend-item"><div class="legend-box locked-by-me"></div><span>Locked (You)</span></div>
                    <div class="legend-item"><div class="legend-box sold"></div><span>Sold</span></div>
                </div>
                <div id="seatMap" class="seat-grid"><div class="loading-spinner"><div class="spinner"></div></div></div>
            </div>
        </div>
        
        <div class="col-lg-5">
            <div class="cart-panel">
                <div class="cart-header">
                    <h5><i class="fas fa-shopping-cart me-2" style="color:#0d5bd7;"></i>Your Cart</h5>
                    <button class="btn-clear-cart" onclick="clearCart()" id="clearCartBtn" style="display:none;"><i class="fas fa-trash-alt me-1"></i> Clear All</button>
                </div>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-total">
                    <div class="total-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
                    <div class="total-row"><span>Service Fee (10%)</span><span id="serviceFee">$0</span></div>
                    <div class="total-row grand-total"><span>Total</span><span id="grandTotal">$0</span></div>
                    <button class="btn-checkout mt-3" id="checkoutBtn" onclick="processCheckout()" disabled><i class="fas fa-credit-card me-2"></i> Checkout (<span id="cartCount">0</span> items)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
// ==================== CONFIGURATION ====================
const API_BASE = window.location.origin;
const DEFAULT_EVENT_IMAGE = 'https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=600&h=300&fit=crop';

let currentUser = null;
let seats = [];
let cart = [];
let vipRows = 2;
let cartTimers = new Map();
let stompClient = null;
let retryCountdown = 0;
let countdownInterval = null;

const urlParams = new URLSearchParams(window.location.search);
const eventId = urlParams.get("eventId");
const CART_KEY = `cart_${eventId}`;

// ==================== UTILITIES ====================
function showToast(msg, type = "success") {
    const toast = document.createElement("div");
    toast.className = "toast-notification";
    toast.style.background = type === "error" ? "#dc3545" : type === "warning" ? "#d97706" : "#0d5bd7";
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : type === 'warning' ? 'fa-clock' : 'fa-check-circle'} me-2"></i>${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ==================== AUTH ====================
function loadUser() {
    const userStr = localStorage.getItem("user");
    currentUser = userStr ? JSON.parse(userStr) : null;
    renderAuthUI();
}

function renderAuthUI() {
    const area = document.getElementById("auth-area");
    if (currentUser) {
        let avatarUrl = currentUser.avatar;
        if (!avatarUrl || avatarUrl === "https://i.pravatar.cc/150") {
            avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}`;
        }
        area.innerHTML = `
            <div class="user-menu" onclick="toggleMenu(event)">
                <img src="${avatarUrl}" class="avatar-sm" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}'">
                <span>${currentUser.username}</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div id="dropdownMenu" class="dropdown-menu-custom">
                <div class="menu-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i> My Profile</div>
                <div class="menu-item" onclick="window.location.href='my-tickets.html'"><i class="fas fa-ticket-alt"></i> My Tickets</div>
                <div class="menu-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        `;
    } else {
        area.innerHTML = `<a href="login.html" class="btn btn-outline-light btn-sm"><i class="fas fa-sign-in-alt me-1"></i> Sign In</a>`;
    }
}

function toggleMenu(e) { 
    e.stopPropagation(); 
    const m = document.getElementById("dropdownMenu"); 
    if(m) m.style.display = m.style.display === "block" ? "none" : "block"; 
}

function logout() { 
    localStorage.removeItem("user"); 
    window.location.href = "login.html"; 
}

document.addEventListener("click", () => { 
    const m = document.getElementById("dropdownMenu"); 
    if(m) m.style.display = "none"; 
});

// ==================== WEBSOCKET ====================
function connectWebSocket() {
    if (!eventId) return;
    
    const socket = new SockJS(`${API_BASE}/ws`);
    stompClient = Stomp.over(socket);
    
    stompClient.connect({}, () => {
        console.log("✅ WebSocket connected");
        
        stompClient.subscribe('/topic/seats', (message) => {
            const updatedSeat = JSON.parse(message.body);
            console.log("📡 Seat update:", updatedSeat.seatCode, updatedSeat.status);
            
            // Update seats array
            const idx = seats.findIndex(s => s.id === updatedSeat.id);
            if (idx !== -1) {
                seats[idx] = updatedSeat;
                renderSeatMap();
                
                // Handle cart updates
                const cartIdx = cart.findIndex(c => c.id === updatedSeat.id);
                if (cartIdx !== -1) {
                    if (updatedSeat.status === "AVAILABLE") {
                        // Lock expired
                        showToast(`⏰ Lock for seat ${updatedSeat.seatCode} has expired!`, "warning");
                        stopCartTimer(updatedSeat.id);
                        cart.splice(cartIdx, 1);
                        saveCart();
                        updateCartUI();
                    } else if (updatedSeat.status === "SOLD") {
                        // Seat purchased
                        showToast(`🎫 Seat ${updatedSeat.seatCode} has been purchased!`, "info");
                        stopCartTimer(updatedSeat.id);
                        cart.splice(cartIdx, 1);
                        saveCart();
                        updateCartUI();
                    }
                }
            }
        });
        
    }, (err) => {
        console.log("❌ WebSocket error:", err);
        setTimeout(connectWebSocket, 5000);
    });
}

// ==================== TIMER MANAGEMENT ====================
function startCartTimer(seatId, lockedUntil, seatCode) {
    stopCartTimer(seatId);
    
    const timer = setInterval(() => {
        const seatInCart = cart.find(s => s.id === seatId);
        if (!seatInCart) {
            stopCartTimer(seatId);
            return;
        }
        
        const remaining = Math.max(0, Math.floor((new Date(lockedUntil) - Date.now()) / 1000));
        seatInCart.remainingSeconds = remaining;
        updateCartUI();
        
        if (remaining <= 0) {
            stopCartTimer(seatId);
            const idx = cart.findIndex(s => s.id === seatId);
            if (idx !== -1) {
                cart.splice(idx, 1);
                saveCart();
                updateCartUI();
                renderSeatMap();
                showToast(`⏰ Seat ${seatCode} reservation expired!`, "warning");
            }
        }
    }, 1000);
    
    cartTimers.set(seatId, timer);
}

function stopCartTimer(seatId) {
    if (cartTimers.has(seatId)) {
        clearInterval(cartTimers.get(seatId));
        cartTimers.delete(seatId);
    }
}

function stopAllTimers() {
    cartTimers.forEach(timer => clearInterval(timer));
    cartTimers.clear();
}

// ==================== LOAD EVENT ====================
function getFlagCode(teamName) {
    const flagMap = {
        'usa': 'us', 'mexico': 'mx', 'brazil': 'br', 'germany': 'de',
        'argentina': 'ar', 'france': 'fr', 'england': 'gb-eng', 'spain': 'es',
        'portugal': 'pt', 'netherlands': 'nl', 'italy': 'it', 'belgium': 'be',
        'japan': 'jp', 'south-korea': 'kr', 'austria': 'at'
    };
    return flagMap[teamName?.toLowerCase()] || 'un';
}

function isComponentName(url) {
    if (!url) return false;
    return !url.includes('/') && !url.match(/\.(jpg|jpeg|png|gif|webp)$/i);
}

async function loadEvent() {
    try {
        const response = await fetch(`${API_BASE}/events/${eventId}`);
        if (!response.ok) throw new Error("Event not found");
        const event = await response.json();
        
        const categoryNames = {
            'CONCERT': '🎵 Concert', 'SPORTS': '⚽ Sports', 'THEATRE': '🎭 Theatre',
            'FAMILY': '👨‍👩‍👧 Family', 'COMEDY': '😂 Comedy'
        };
        const categoryDisplay = categoryNames[event.category] || event.category || 'Event';
        
        const imageUrl = event.image_url || event.imageUrl;
        const isComponent = isComponentName(imageUrl);
        
        let imageHtml = '';
        if (isComponent) {
            try {
                const componentResponse = await fetch(`/matches/${imageUrl}.html`);
                if (componentResponse.ok) {
                    const componentHtml = await componentResponse.text();
                    imageHtml = `<div class="event-component-wrapper">${componentHtml}</div>`;
                } else {
                    const teamName = imageUrl.split('-')[0];
                    const flagCode = getFlagCode(teamName);
                    imageHtml = `<img src="https://flagcdn.com/w600/${flagCode}.png" class="event-image" alt="${event.name}">`;
                }
            } catch(e) {
                imageHtml = `<img src="${DEFAULT_EVENT_IMAGE}" class="event-image" alt="${event.name}">`;
            }
        } else {
            const finalImage = imageUrl || DEFAULT_EVENT_IMAGE;
            imageHtml = `<img src="${finalImage}" class="event-image" alt="${event.name}" onerror="this.src='${DEFAULT_EVENT_IMAGE}'">`;
        }
        
        document.getElementById("eventCard").innerHTML = `
            ${imageHtml}
            <div class="event-info">
                <div class="event-category">${categoryDisplay}</div>
                <h1 class="event-title">${event.name}</h1>
                <div class="event-details">
                    <span><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
                    <span><i class="far fa-calendar-alt"></i> ${new Date(event.eventTime).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                    <span><i class="far fa-clock"></i> ${new Date(event.eventTime).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</span>
                </div>
                ${event.description ? `<div class="event-description"><i class="fas fa-info-circle me-2" style="color:#0d5bd7;"></i> ${event.description}</div>` : ''}
            </div>
        `;
        
        await loadSeats();
    } catch(e) { 
        console.error(e);
        document.getElementById("eventCard").innerHTML = '<div class="text-center text-danger py-5"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br>Failed to load event</div>';
    }
}

// ==================== LOAD SEATS ====================
async function loadSeats() {
    const container = document.getElementById("seatMap");
    if (!container) return;
    
    container.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p class="mt-3">Loading seat map...</p></div>`;
    
    try {
        const response = await fetch(`${API_BASE}/seats/${eventId}`);
        
        if (response.status === 503) {
            const error = await response.json();
            console.warn("Rate limit exceeded:", error);
            showRetryCountdown(10);
            showToast("⚠️ System is busy. Please wait...", "warning");
            return;
        }
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        seats = await response.json();
        renderSeatMap();
        loadCart();
        
    } catch (error) {
        console.error("Error loading seats:", error);
        container.innerHTML = `
            <div class="error-container">
                <i class="fas fa-wifi fa-3x text-danger mb-3"></i>
                <h5>Cannot load seat map</h5>
                <p class="text-muted">${error.message}</p>
                <button class="btn btn-primary" onclick="loadSeats()">
                    <i class="fas fa-sync-alt me-2"></i> Retry
                </button>
            </div>
        `;
    }
}

function showRetryCountdown(seconds) {
    const container = document.getElementById("seatMap");
    retryCountdown = seconds;
    
    if (countdownInterval) clearInterval(countdownInterval);
    
    countdownInterval = setInterval(() => {
        if (retryCountdown <= 0) {
            clearInterval(countdownInterval);
            loadSeats();
        } else {
            if (container && !container.innerHTML.includes("retry-btn")) {
                container.innerHTML = `
                    <div class="error-container">
                        <i class="fas fa-hourglass-half fa-3x text-warning mb-3"></i>
                        <h5>System busy</h5>
                        <p class="text-muted">Too many people are viewing seats. Please wait...</p>
                        <button class="btn btn-warning" disabled style="opacity:0.7">
                            <i class="fas fa-spinner fa-spin me-2"></i> Retry in ${retryCountdown}s
                        </button>
                    </div>
                `;
            }
            retryCountdown--;
        }
    }, 1000);
}

// ==================== RENDER SEAT MAP ====================
function renderSeatMap() {
    if (!seats.length) {
        document.getElementById("seatMap").innerHTML = '<div class="text-center text-muted py-5">No seats available</div>';
        return;
    }
    
    const rows = [...new Set(seats.map(s => s.rowIndex))].sort((a,b)=>a-b);
    let html = "";
    
    rows.forEach(row => {
        const rowSeats = seats.filter(s => s.rowIndex === row).sort((a,b)=>a.colIndex-b.colIndex);
        html += `<div class="seat-row"><div class="row-label">${String.fromCharCode(64 + row)}</div>`;
        
        rowSeats.forEach(seat => {
            const isVip = row <= vipRows;
            const inCart = cart.some(c => c.id === seat.id);
            const isLockedByMe = seat.status === "LOCKED" && seat.lockedBy?.id === currentUser?.id;
            const isLockedByOther = seat.status === "LOCKED" && !isLockedByMe;
            
            let cls = "";
            let icon = "<i class='fas fa-chair'></i>";
            let canClick = false;
            let title = `Seat ${seat.seatCode} - $${seat.price}`;
            
            if (seat.status === "SOLD") {
                cls = "sold";
                icon = "<i class='fas fa-times-circle'></i>";
                canClick = false;
                title += " (Sold)";
            } else if (inCart || isLockedByMe) {
                cls = "locked-by-me";
                icon = "<i class='fas fa-user-clock'></i>";
                canClick = true;
                title += " (Your locked seat - Click to release)";
            } else if (isLockedByOther) {
                cls = "locked";
                icon = "<i class='fas fa-clock'></i>";
                canClick = false;
                title += " (Locked by another user)";
            } else if (seat.status === "AVAILABLE") {
                cls = isVip ? "vip" : "available";
                icon = "<i class='fas fa-chair'></i>";
                canClick = true;
                title += isVip ? " (VIP)" : "";
            }
            
            const onclick = canClick ? `onclick="handleSeatClick(${seat.id})"` : '';
            html += `<div class="seat ${cls}" ${onclick} title="${title}">
                        ${icon}
                        <span>${seat.colIndex}</span>
                    </div>`;
        });
        html += `</div>`;
    });
    
    document.getElementById("seatMap").innerHTML = html;
}

// ==================== SEAT ACTIONS ====================
async function handleSeatClick(seatId) {
    if (!currentUser) { 
        showToast("Please login first!", "error"); 
        setTimeout(() => window.location.href = "login.html", 1500);
        return; 
    }
    
    const seat = seats.find(s => s.id === seatId);
    if (!seat) return;
    
    // Check if seat is already in cart (locked by me)
    const existingInCart = cart.find(c => c.id === seatId);
    if (existingInCart) {
        // Release the seat instead of removing from cart
        await releaseSeat(seatId);
        return;
    }
    
    // Check if seat is locked by me but not in cart (sync issue)
    if (seat.status === "LOCKED" && seat.lockedBy?.id === currentUser.id) {
        await releaseSeat(seatId);
        return;
    }
    
    // Cannot lock sold seats
    if (seat.status === "SOLD") { 
        showToast(`Seat ${seat.seatCode} is already sold!`, "error"); 
        return; 
    }
    
    // Cannot lock seats locked by others
    if (seat.status === "LOCKED") {
        showToast(`Seat ${seat.seatCode} is held by another user!`, "error"); 
        return;
    }
    
    // Lock the seat
    try {
        const response = await fetch(`${API_BASE}/seats/lock`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ seatId: seat.id, userId: currentUser.id })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || "Failed to lock seat");
        }
        
        const lockedSeat = await response.json();
        
        // Add to cart
        cart.push({
            id: seat.id,
            row: seat.rowIndex,
            col: seat.colIndex,
            seatCode: seat.seatCode,
            price: seat.price,
            lockedUntil: lockedSeat.lockedUntil,
            isVip: seat.rowIndex <= vipRows
        });
        
        saveCart();
        
        if (lockedSeat.lockedUntil) {
            startCartTimer(seat.id, lockedSeat.lockedUntil, seat.seatCode);
        }
        
        updateCartUI();
        await loadSeats();
        showToast(`✅ Seat ${seat.seatCode} locked! You have 5 minutes to checkout.`, "success");
        
    } catch(e) {
        showToast(e.message || "Failed to lock seat!", "error");
    }
}

async function releaseSeat(seatId) {
    if (!currentUser) return;
    
    try {
        const response = await fetch(`${API_BASE}/seats/release`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ seatId: seatId, userId: currentUser.id })
        });
        
        if (response.ok) {
            const idx = cart.findIndex(c => c.id === seatId);
            if (idx !== -1) {
                stopCartTimer(seatId);
                cart.splice(idx, 1);
                saveCart();
                updateCartUI();
            }
            
            await loadSeats();
            const seat = seats.find(s => s.id === seatId);
            showToast(`🔓 Released seat ${seat?.seatCode || seatId}`, "info");
        } else {
            const error = await response.json();
            throw new Error(error.error || "Failed to release seat");
        }
    } catch(e) {
        showToast(e.message, "error");
    }
}

// ==================== CART MANAGEMENT ====================
function saveCart() {
    sessionStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function loadCart() {
    const saved = sessionStorage.getItem(CART_KEY);
    if (saved) {
        try { 
            cart = JSON.parse(saved);
            cart.forEach(seat => {
                if (seat.lockedUntil && new Date(seat.lockedUntil) > new Date()) {
                    startCartTimer(seat.id, seat.lockedUntil, seat.seatCode);
                }
            });
            updateCartUI();
            renderSeatMap();
        } catch(e) { 
            cart = []; 
        }
    }
}

function updateCartUI() {
    const container = document.getElementById("cartItems");
    const clearBtn = document.getElementById("clearCartBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const cartCountSpan = document.getElementById("cartCount");
    const subtotalSpan = document.getElementById("subtotal");
    const serviceFeeSpan = document.getElementById("serviceFee");
    const grandTotalSpan = document.getElementById("grandTotal");
    
    if (!cart.length) {
        container.innerHTML = `
            <div class="cart-empty">
                <i class="fas fa-chair"></i>
                <p>Your cart is empty</p>
                <small>Click on available seats to add</small>
            </div>
        `;
        if (clearBtn) clearBtn.style.display = "none";
        if (checkoutBtn) checkoutBtn.disabled = true;
        if (cartCountSpan) cartCountSpan.innerText = "0";
        if (subtotalSpan) subtotalSpan.innerText = "$0";
        if (serviceFeeSpan) serviceFeeSpan.innerText = "$0";
        if (grandTotalSpan) grandTotalSpan.innerText = "$0";
        return;
    }
    
    let html = "", subtotal = 0;
    const now = Date.now();
    
    cart.forEach((item, idx) => {
        subtotal += item.price;
        let timerHtml = "";
        if (item.lockedUntil) {
            const remaining = Math.max(0, Math.floor((new Date(item.lockedUntil) - now) / 1000));
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            const timeColor = remaining < 30 ? "text-danger fw-bold" : "";
            timerHtml = `<div class="cart-timer ${timeColor}"><i class="fas fa-hourglass-half"></i> ${mins}:${secs.toString().padStart(2,'0')} remaining</div>`;
        }
        html += `<div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-seat">🎫 Seat ${item.seatCode} ${item.isVip ? '<span class="badge bg-warning text-dark ms-1">VIP</span>' : ''}</div>
                ${timerHtml}
            </div>
            <div class="cart-item-price">$${item.price}</div>
            <div class="cart-item-actions">
                <button onclick="releaseSeat(${item.id})" title="Release seat"><i class="fas fa-unlock-alt"></i></button>
            </div>
        </div>`;
    });
    
    const fee = subtotal * 0.1;
    const total = subtotal + fee;
    
    container.innerHTML = html;
    if (clearBtn) clearBtn.style.display = "block";
    if (checkoutBtn) checkoutBtn.disabled = false;
    if (cartCountSpan) cartCountSpan.innerText = cart.length;
    if (subtotalSpan) subtotalSpan.innerText = `$${subtotal.toFixed(2)}`;
    if (serviceFeeSpan) serviceFeeSpan.innerText = `$${fee.toFixed(2)}`;
    if (grandTotalSpan) grandTotalSpan.innerText = `$${total.toFixed(2)}`;
}

function clearCart() {
    if (!cart.length) return;
    if (confirm(`Remove all ${cart.length} seat(s) from cart?`)) {
        stopAllTimers();
        cart = [];
        saveCart();
        updateCartUI();
        loadSeats();
        showToast("Cart cleared", "info");
    }
}

// ==================== CHECKOUT ====================
function processCheckout() {
    if (!cart.length) { 
        showToast("Your cart is empty!", "error"); 
        return; 
    }
    if (!currentUser) { 
        showToast("Please login to continue", "error"); 
        setTimeout(() => window.location.href = "login.html", 1500);
        return; 
    }
    
    // Save cart to session for checkout page
    sessionStorage.setItem("checkoutCart", JSON.stringify(cart));
    window.location.href = `checkout.html?eventId=${eventId}`;
}

function clearCartAfterPayment() {
    stopAllTimers();
    cart = [];
    saveCart();
    updateCartUI();
    loadSeats();
    showToast("Payment completed! Your cart has been cleared.", "success");
}

function checkPaymentSuccess() {
    const paymentSuccess = sessionStorage.getItem("payment_success");
    if (paymentSuccess === "true") {
        sessionStorage.removeItem("payment_success");
        clearCartAfterPayment();
    }
}

// ==================== INITIALIZATION ====================
window.addEventListener("DOMContentLoaded", () => {
    loadUser();
    loadEvent();
    connectWebSocket();
    checkPaymentSuccess();
});

window.addEventListener("beforeunload", () => {
    stopAllTimers();
    if (countdownInterval) clearInterval(countdownInterval);
});

window.addEventListener("storage", (e) => {
    if (e.key === "payment_success" && e.newValue === "true") {
        checkPaymentSuccess();
    }
});

document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
        checkPaymentSuccess();
        loadSeats();
    }
});
</script>
