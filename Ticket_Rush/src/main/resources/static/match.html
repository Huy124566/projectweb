<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - TicketRush</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/match-card.js" defer></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container-custom {
            max-width: 800px;
            margin: 0 auto;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <div id="matchContainer" class="loading">
            <div class="spinner"></div>
            <p>Loading match information...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchFile = urlParams.get('match');

        if (!matchFile) {
            document.getElementById('matchContainer').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                    <h4>No match selected</h4>
                    <p>Please select a match.</p>
                </div>
            `;
        } else {
            loadMatch(matchFile);
        }

        async function loadMatch(matchName) {
            const container = document.getElementById('matchContainer');
            try {
                const response = await fetch(`/matches/${matchName}.html`);
                if (!response.ok) throw new Error('Match not found');
                const html = await response.text();
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                        <h4>Match not found</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
