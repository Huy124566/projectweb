<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketRush - My Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; }
        
        .header { background: #0d5bd7; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; text-decoration: none; cursor: pointer; }
        .logo i { margin-right: 6px; }
        .user-menu { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 40px; cursor: pointer; color: white; }
        .avatar-sm { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid white; background: #e8f0fe; }
        
        .dropdown-menu-custom { position: absolute; right: 40px; top: 70px; width: 260px; background: white; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: none; z-index: 1000; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .menu-item { padding: 12px 18px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover { background: #f5f5f5; }
        .menu-item.active { background: #e8f0fe; color: #0d5bd7; border-left: 3px solid #0d5bd7; }
        .logout { color: #dc3545; }
        
        .tickets-container { max-width: 1000px; margin: 40px auto; padding: 0 30px; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .page-header { background: linear-gradient(135deg, #0d5bd7, #0a4ab3); border-radius: 20px; padding: 30px; color: white; margin-bottom: 30px; }
        .page-header h1 { margin-bottom: 8px; font-weight: 700; }
        
        .ticket-card { background: white; border-radius: 16px; margin-bottom: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s; cursor: pointer; }
        .ticket-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .ticket-card.upcoming { border-left: 4px solid #0d5bd7; }
        .ticket-card.past { opacity: 0.7; border-left: 4px solid #ccc; }
        
        .btn-qr { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .btn-qr:hover { background: #218838; transform: scale(1.02); }
        
        .ticket-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 10px; }
        .status-upcoming { background: #e8f0fe; color: #0d5bd7; }
        .status-past { background: #f0f0f0; color: #999; }
        
        .qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 2000; }
        .qr-content { background: white; border-radius: 24px; padding: 30px; text-align: center; max-width: 350px; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .qr-content img { width: 200px; height: 200px; margin: 20px 0; border-radius: 16px; }
        
        .loading { text-align: center; padding: 60px; background: white; border-radius: 20px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #0d5bd7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 20px; }
        .empty-state i { font-size: 64px; color: #cbd5e1; margin-bottom: 20px; }
        
        @media (max-width: 768px) { .header, .tickets-container { padding: 12px 20px; } .ticket-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'">
        <i class="fas fa-ticket-alt"></i> TicketRush
    </div>
    <div id="auth-area"></div>
</div>

<div class="tickets-container">
    <div class="page-header">
        <h1><i class="fas fa-ticket-alt me-2"></i> My Tickets</h1>
        <p class="mb-0 opacity-75">Your purchased tickets will appear here</p>
    </div>
    <div id="ticketsList">
        <div class="loading">
            <div class="spinner"></div>
            <p class="mt-3 text-muted">Loading your tickets...</p>
        </div>
    </div>
</div>

<div id="qrModal" class="qr-modal">
    <div class="qr-content">
        <h4><i class="fas fa-qrcode me-2" style="color:#0d5bd7;"></i>Your Ticket QR Code</h4>
        <img id="qrImage" src="">
        <p id="qrInfo" class="text-muted small"></p>
        <button class="btn btn-primary px-4" onclick="closeQR()">Close</button>
    </div>
</div>

<script>
const API_BASE = "http://localhost:8082";
let currentUser = null;

function loadCurrentUser() {
    const userStr = localStorage.getItem("user");
    if (userStr) {
        try { currentUser = JSON.parse(userStr); } catch(e) { currentUser = null; }
    }
    
    if (!currentUser) {
        window.location.href = "login.html";
        return;
    }
    
    renderAuthUI();
    loadTickets();
}

function renderAuthUI() {
    const area = document.getElementById("auth-area");
    const isAdmin = currentUser.role === "ROLE_ADMIN";
    
    // ✅ LẤY AVATAR TỪ CURRENT USER
    let avatarUrl = currentUser.avatar;
    if (!avatarUrl || avatarUrl === "https://i.pravatar.cc/150" || avatarUrl === "") {
        avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}`;
    }
    
    area.innerHTML = `
        <div class="user-menu" onclick="toggleMenu(event)">
            <img src="${avatarUrl}" class="avatar-sm" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}'">
            <span>${currentUser.username}</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div id="dropdownMenu" class="dropdown-menu-custom">
            <div class="menu-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i> My Profile</div>
            <div class="menu-item active" onclick="window.location.href='my-tickets.html'"><i class="fas fa-ticket-alt"></i> My Tickets</div>
            ${isAdmin ? `<div class="menu-item" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-crown"></i> Admin Panel</div>` : ''}
            <div class="menu-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    `;
}

function toggleMenu(e) { 
    e.stopPropagation(); 
    const m = document.getElementById("dropdownMenu"); 
    if(m) m.style.display = m.style.display === "block" ? "none" : "block"; 
}

function logout() { 
    localStorage.removeItem("user"); 
    localStorage.removeItem("token"); 
    window.location.href = "login.html"; 
}

document.addEventListener("click", () => { 
    const m = document.getElementById("dropdownMenu"); 
    if(m) m.style.display = "none"; 
});

async function loadTickets() {
    const container = document.getElementById("ticketsList");
    
    if (!currentUser || !currentUser.id) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-triangle"></i>
                <h4>Please login again</h4>
                <p>Your session has expired.</p>
                <a href="login.html" class="btn btn-primary">Go to Login</a>
            </div>
        `;
        return;
    }
    
    try {
        console.log("Loading tickets for user ID:", currentUser.id);
        
        const response = await fetch(`${API_BASE}/tickets/user/${currentUser.id}`);
        
        if (!response.ok) {
            if (response.status === 404) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-ticket-alt"></i>
                        <h4>No tickets yet</h4>
                        <p>You haven't purchased any tickets yet.</p>
                        <a href="index.html" class="btn btn-primary">Browse Events</a>
                    </div>
                `;
                return;
            }
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const tickets = await response.json();
        console.log("Tickets received:", tickets);
        
        if (!tickets || tickets.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-ticket-alt"></i>
                    <h4>No tickets yet</h4>
                    <p>You haven't purchased any tickets yet.</p>
                    <a href="index.html" class="btn btn-primary">Browse Events</a>
                </div>
            `;
            return;
        }
        
        renderTickets(tickets);
        
    } catch (error) {
        console.error("Error loading tickets:", error);
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-exclamation-triangle text-danger" style="color: #dc3545 !important;"></i>
                <h4 class="mt-3">Unable to load tickets</h4>
                <p>${error.message}</p>
                <button class="btn btn-primary" onclick="location.reload()">Retry</button>
            </div>
        `;
    }
}

function renderTickets(tickets) {
    const container = document.getElementById("ticketsList");
    let html = "";
    
    tickets.forEach(ticket => {
        let eventDate = new Date();
        let formattedDate = "Date TBA";
        
        if (ticket.eventDate) {
            eventDate = new Date(ticket.eventDate);
            if (!isNaN(eventDate.getTime())) {
                formattedDate = eventDate.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            }
        }
        
        const isUpcoming = eventDate > new Date();
        const statusClass = isUpcoming ? "upcoming" : "past";
        const statusText = isUpcoming ? "Upcoming" : "Past Event";
        const statusBadgeClass = isUpcoming ? "status-upcoming" : "status-past";
        
        const seatLabel = ticket.seatNumber || ticket.seatId || `Seat #${ticket.seatId || '?'}`;
        const eventName = ticket.eventName || `Event #${ticket.eventId || '?'}`;
        const venue = ticket.eventVenue || ticket.venue || "Venue TBA";
        const orderNumber = ticket.orderNumber || ticket.bookingCode || `TKT-${ticket.id}`;
        
        html += `
            <div class="ticket-card ${statusClass}">
                <div style="flex: 1;">
                    <h5 class="mb-1 fw-bold" style="color: #1a2a3a;">${escapeHtml(eventName)}</h5>
                    <div class="text-muted small mt-1">
                        <i class="fas fa-map-marker-alt me-1" style="width: 16px;"></i> ${escapeHtml(venue)}
                    </div>
                    <div class="text-muted small mt-1">
                        <i class="far fa-calendar-alt me-1" style="width: 16px;"></i> ${formattedDate}
                    </div>
                    <div class="mt-2">
                        <span class="badge bg-primary px-3 py-2 rounded-pill">${escapeHtml(seatLabel)}</span>
                        <span class="ticket-status ${statusBadgeClass} ms-2">${statusText}</span>
                    </div>
                </div>
                <div>
                    <button class="btn-qr" onclick="showQR('${escapeHtml(eventName)}', '${escapeHtml(seatLabel)}', '${escapeHtml(orderNumber)}')">
                        <i class="fas fa-qrcode me-1"></i> QR Code
                    </button>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function showQR(eventName, seat, orderId) {
    const qrData = `TICKET:${eventName}|SEAT:${seat}|ORDER:${orderId}|TIME:${Date.now()}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;
    
    document.getElementById("qrImage").src = qrUrl;
    document.getElementById("qrInfo").innerHTML = `<strong>${escapeHtml(eventName)}</strong><br>${escapeHtml(seat)}<br>Order: ${escapeHtml(orderId)}`;
    document.getElementById("qrModal").style.display = "flex";
}

function closeQR() {
    document.getElementById("qrModal").style.display = "none";
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.addEventListener("DOMContentLoaded", loadCurrentUser);
</script>
</body>
</html>
