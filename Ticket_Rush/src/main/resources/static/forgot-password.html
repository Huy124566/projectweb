<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forgot Password - Ticket Rush</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    body { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh; 
        font-family: 'Inter', sans-serif;
    }
    .card-box { 
        border-radius: 20px; 
        border: none; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        background: rgba(255,255,255,0.95);
    }
    .title { 
        color: #0d5bd7; 
        font-weight: 700; 
    }
    .btn-primary { 
        background: #0d5bd7; 
        border: none; 
        padding: 12px; 
        font-weight: 600; 
        border-radius: 50px;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        background: #0a4ab3;
        transform: translateY(-2px);
    }
    .btn-success {
        background: #28a745;
        border: none;
        padding: 12px;
        font-weight: 600;
        border-radius: 50px;
        transition: all 0.3s ease;
    }
    .btn-success:hover {
        background: #218838;
        transform: translateY(-2px);
    }
    .btn-outline-secondary {
        border-radius: 50px;
        padding: 10px;
    }
    .form-control {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #e0e0e0;
    }
    .form-control:focus {
        box-shadow: none;
        border-color: #0d5bd7;
    }
    .input-group-text {
        background: #f0f0f0;
        border: none;
        border-radius: 10px 0 0 10px;
    }
    .alert-custom {
        border-radius: 10px;
        font-size: 14px;
    }
    .step {
        display: none;
    }
    .step.active {
        display: block;
    }
    .step-indicator {
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
        position: relative;
    }
    .step-indicator::before {
        content: '';
        position: absolute;
        top: 20px;
        left: 10%;
        width: 80%;
        height: 2px;
        background: #e0e0e0;
        z-index: 0;
    }
    .step-circle {
        width: 40px;
        height: 40px;
        background: #f0f0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        position: relative;
        z-index: 1;
        background: white;
        border: 2px solid #dee2e6;
    }
    .step-circle.active {
        background: #0d5bd7;
        border-color: #0d5bd7;
        color: white;
    }
    .step-circle.completed {
        background: #28a745;
        border-color: #28a745;
        color: white;
    }
    .step-label {
        font-size: 12px;
        margin-top: 8px;
        text-align: center;
    }
    .password-strength {
        font-size: 12px;
        margin-top: 5px;
    }
    .fa-eye, .fa-eye-slash {
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="container mt-5">
    <div class="col-md-5 mx-auto">
        <div class="card p-4 card-box">
            <div class="text-center mb-3">
                <i class="fas fa-lock fa-3x" style="color:#0d5bd7;"></i>
                <h3 class="title mt-2">Forgot Password?</h3>
                <p class="text-muted">Reset your password with OTP</p>
            </div>
            
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="text-center">
                    <div id="step1Circle" class="step-circle active">1</div>
                    <div class="step-label">Verify Email</div>
                </div>
                <div class="text-center">
                    <div id="step2Circle" class="step-circle">2</div>
                    <div class="step-label">New Password</div>
                </div>
                <div class="text-center">
                    <div id="step3Circle" class="step-circle">3</div>
                    <div class="step-label">Complete</div>
                </div>
            </div>
            
            <!-- Alert box -->
            <div id="alertBox" class="alert alert-custom d-none" role="alert"></div>
            
            <!-- Step 1: Nhập email và gửi OTP -->
            <div id="step1" class="step active">
                <p class="text-muted text-center mb-3">
                    Enter your registered email to receive OTP
                </p>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input id="email" type="email" class="form-control" placeholder="Registered email address">
                </div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input id="otpCode" class="form-control" placeholder="Enter OTP code" maxlength="6">
                </div>
                
                <button onclick="sendForgotOTP()" class="btn btn-primary w-100 mb-2">
                    <i class="fas fa-paper-plane me-2"></i>Send OTP
                </button>
                
                <button onclick="resendForgotOTP()" class="btn btn-outline-secondary w-100">
                    <i class="fas fa-redo me-2"></i>Resend OTP
                </button>
            </div>
            
            <!-- Step 2: Nhập mật khẩu mới -->
            <div id="step2" class="step">
                <p class="text-muted text-center mb-3">
                    <i class="fas fa-check-circle text-success"></i> OTP verified!
                </p>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input id="newPassword" type="password" class="form-control" placeholder="New password (min 6 chars)">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength text-muted mb-3" id="passwordStrength"></div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                    <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm new password">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <button onclick="resetPassword()" class="btn btn-success w-100">
                    <i class="fas fa-save me-2"></i>Reset Password
                </button>
            </div>
            
            <!-- Step 3: Thành công -->
            <div id="step3" class="step">
                <div class="text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <h4 class="text-success">Password Reset Successfully!</h4>
                    <p class="text-muted mt-3">Your password has been changed.</p>
                    <p>You can now login with your new password.</p>
                    <a href="login.html" class="btn btn-primary w-100 mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Go to Login
                    </a>
                </div>
            </div>
            
            <p class="text-center mt-3 mb-0">
                <a href="login.html">← Back to Login</a>
            </p>
        </div>
    </div>
</div>

<script>
const API_BASE = "http://localhost:8082";
let verifiedEmail = "";
let verifiedOTP = "";

function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.textContent = message;
    alertBox.className = `alert alert-custom alert-${type}`;
    alertBox.classList.remove('d-none');
    setTimeout(() => {
        alertBox.classList.add('d-none');
    }, 4000);
}

function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = field.nextElementSibling.querySelector('i');
    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = "password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

// Kiểm tra độ mạnh mật khẩu
document.getElementById("newPassword")?.addEventListener("keyup", function() {
    const password = this.value;
    const strengthDiv = document.getElementById("passwordStrength");
    
    if (password.length === 0) {
        strengthDiv.innerHTML = "";
        return;
    }
    
    let strength = "";
    let color = "";
    
    if (password.length < 6) {
        strength = "Weak - Minimum 6 characters";
        color = "text-danger";
    } else if (password.length < 8) {
        strength = "Medium - Good";
        color = "text-warning";
    } else {
        strength = "Strong - Excellent!";
        color = "text-success";
    }
    
    strengthDiv.innerHTML = `<i class="fas fa-shield-alt"></i> ${strength}`;
    strengthDiv.className = `password-strength ${color}`;
});

function sendForgotOTP() {
    const email = document.getElementById("email").value.trim();
    
    if (!email) {
        showAlert("Please enter your email address", "danger");
        return;
    }
    
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAlert("Please enter a valid email address", "danger");
        return;
    }
    
    fetch(`${API_BASE}/auth/forgot-password`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        verifiedEmail = email;
        showAlert(`✅ OTP sent to ${email}. Please check your email.`, "success");
    })
    .catch(err => {
        if (err.message.includes("chưa được đăng ký")) {
            showAlert("❌ Email not registered. Please create an account first.", "danger");
        } else {
            showAlert(err.message, "danger");
        }
    });
}

function resendForgotOTP() {
    const email = document.getElementById("email").value.trim();
    
    if (!email) {
        showAlert("Please enter your email address", "danger");
        return;
    }
    
    fetch(`${API_BASE}/auth/forgot-password`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        showAlert(`✅ New OTP sent to ${email}`, "success");
    })
    .catch(err => {
        showAlert(err.message, "danger");
    });
}

// Tự động verify OTP khi người dùng nhập xong 6 số
document.getElementById("otpCode")?.addEventListener("input", function(e) {
    const otp = e.target.value.trim();
    if (otp.length === 6) {
        verifyAndProceed();
    }
});

function verifyAndProceed() {
    const otp = document.getElementById("otpCode").value.trim();
    const email = document.getElementById("email").value.trim();
    
    if (!email) {
        showAlert("Please enter your email first", "danger");
        return;
    }
    
    if (!otp || otp.length !== 6) {
        showAlert("Please enter 6-digit OTP code", "danger");
        return;
    }
    
    // Gọi API verify OTP (tạm thời dùng reset-password để check OTP)
    // Nhưng ta sẽ chỉ check OTP bằng cách gọi reset-password với password tạm
    // Hoặc bạn có thể thêm API verify-otp riêng
    
    // Cách đơn giản: lưu OTP vào biến tạm, sang step 2
    verifiedOTP = otp;
    
    // Chuyển sang step 2
    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.add("active");
    
    document.getElementById("step1Circle").classList.remove("active");
    document.getElementById("step1Circle").classList.add("completed");
    document.getElementById("step2Circle").classList.add("active");
    
    showAlert("✅ OTP verified! Please enter your new password.", "success");
}

function resetPassword() {
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const email = verifiedEmail;
    const otp = verifiedOTP || document.getElementById("otpCode").value.trim();
    
    if (!newPassword || !confirmPassword) {
        showAlert("Please enter new password", "danger");
        return;
    }
    
    if (newPassword.length < 6) {
        showAlert("Password must be at least 6 characters", "danger");
        return;
    }
    
    if (newPassword !== confirmPassword) {
        showAlert("Passwords do not match", "danger");
        return;
    }
    
    fetch(`${API_BASE}/auth/reset-password`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email,
            otp: otp,
            newPassword: newPassword
        })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        // Chuyển sang step 3
        document.getElementById("step2").classList.remove("active");
        document.getElementById("step3").classList.add("active");
        
        document.getElementById("step2Circle").classList.remove("active");
        document.getElementById("step2Circle").classList.add("completed");
        document.getElementById("step3Circle").classList.add("active");
        
        showAlert("✅ Password reset successfully!", "success");
    })
    .catch(err => {
        showAlert(err.message, "danger");
    });
}

// Enter key support
document.getElementById("email")?.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendForgotOTP();
});
document.getElementById("otpCode")?.addEventListener("keypress", function(e) {
    if (e.key === "Enter") verifyAndProceed();
});
document.getElementById("confirmPassword")?.addEventListener("keypress", function(e) {
    if (e.key === "Enter") resetPassword();
});
</script>
</body>
</html>
