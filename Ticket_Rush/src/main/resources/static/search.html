<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ticketmaster - Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        
        .header { background: #0d5bd7; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; text-decoration: none; cursor: pointer; }
        .logo i { margin-right: 8px; }
        .user-menu { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 40px; cursor: pointer; color: white; }
        .user-menu:hover { background: rgba(255,255,255,0.25); }
        .avatar-sm { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        
        .dropdown-menu-custom { position: absolute; right: 40px; top: 70px; width: 260px; background: white; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: none; z-index: 1000; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .menu-item { padding: 12px 18px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .menu-item:hover { background: #f5f5f5; }
        .menu-item.active { background: #e8f0fe; color: #0d5bd7; border-left: 3px solid #0d5bd7; }
        .logout { color: #dc3545; }
        
        .search-section { background: linear-gradient(135deg, #0d5bd7 0%, #0a4ab3 100%); padding: 25px 0; }
        .search-container { max-width: 1200px; margin: 0 auto; padding: 0 30px; }
        .search-wrapper { background: white; border-radius: 60px; padding: 5px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: 0.2s; }
        .search-wrapper:focus-within { box-shadow: 0 10px 35px rgba(13,91,215,0.25); transform: translateY(-2px); }
        .search-input-group { flex: 1; display: flex; align-items: center; padding: 8px 20px; gap: 15px; flex-wrap: wrap; }
        .search-field { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 10px; }
        .search-field i { color: #0d5bd7; font-size: 18px; width: 24px; }
        .search-field input, .search-field select { border: none; outline: none; width: 100%; padding: 12px 0; font-size: 15px; background: transparent; }
        .divider { width: 1px; height: 35px; background: #e2e8f0; }
        .search-btn { background: #0d5bd7; border: none; padding: 14px 32px; border-radius: 50px; color: white; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer; }
        .search-btn:hover { background: #0a4ab3; transform: scale(1.02); }
        
        .main-content { max-width: 1200px; margin: 40px auto; padding: 0 30px; display: flex; gap: 40px; flex-wrap: wrap; }
        
        .sidebar { flex: 1.2; min-width: 240px; }
        .suggestions-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 24px; border: 1px solid #eef2f6; }
        .suggestions-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #1a2a3a; }
        .suggestions-title i { color: #0d5bd7; font-size: 18px; }
        .suggestion-item { padding: 12px 0; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-size: 14px; color: #4a5a6a; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { color: #0d5bd7; transform: translateX(4px); }
        .suggestion-item i { color: #0d5bd7; width: 20px; }
        
        .ad-card { background: linear-gradient(135deg, #f8f9fc, #f1f5f9); border-radius: 20px; padding: 24px; text-align: center; border: 1px solid #eef2f6; }
        .ad-card i { font-size: 32px; color: #0d5bd7; margin-bottom: 12px; }
        
        .results-area { flex: 3; min-width: 280px; }
        .results-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; flex-wrap: wrap; gap: 15px; }
        .result-count { font-size: 14px; font-weight: 600; color: #2c3e50; background: #f1f5f9; padding: 6px 14px; border-radius: 30px; }
        .sort-box { display: flex; align-items: center; gap: 12px; }
        .sort-box span { font-size: 13px; color: #6c7a8a; }
        .sort-select { border: 1px solid #e2e8f0; border-radius: 30px; padding: 8px 16px; background: white; font-size: 13px; cursor: pointer; outline: none; }
        
        .event-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eef2f6; cursor: pointer; transition: all 0.3s ease; display: flex; gap: 0; }
        .event-card:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); border-color: #e0e7ff; }
        .event-card-image { width: 140px; min-width: 140px; height: 140px; object-fit: cover; background: #e8f0fe; }
        .event-card-content { flex: 1; padding: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .event-info { flex: 1; }
        .event-title { font-size: 1.1rem; font-weight: 700; color: #1a2a3a; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .event-venue { font-size: 0.8rem; color: #6c7a8a; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .event-meta { display: flex; gap: 16px; font-size: 0.7rem; color: #0d5bd7; flex-wrap: wrap; margin-bottom: 8px; }
        .event-meta i { margin-right: 4px; }
        .event-price { font-weight: 700; color: #0d5bd7; font-size: 0.9rem; }
        .btn-ticket { background: #0d5bd7; color: white; border: none; padding: 8px 24px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-ticket:hover { background: #0a4ab3; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,91,215,0.3); }
        
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 40px; flex-wrap: wrap; }
        .page-btn { min-width: 40px; height: 40px; padding: 0 12px; border: 1px solid #e2e8f0; background: white; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .page-btn:hover { border-color: #0d5bd7; color: #0d5bd7; transform: translateY(-2px); }
        .page-btn.active { background: #0d5bd7; border-color: #0d5bd7; color: white; }
        
        .loading-container { text-align: center; padding: 80px 20px; background: white; border-radius: 24px; }
        .spinner-custom { width: 50px; height: 50px; border: 3px solid #e2e8f0; border-top-color: #0d5bd7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-results { text-align: center; padding: 60px 20px; background: white; border-radius: 24px; }
        .no-results i { font-size: 48px; color: #cbd5e1; margin-bottom: 20px; }
        .no-results h5 { font-size: 1.2rem; margin-bottom: 8px; color: #1a2a3a; }
        .filter-warning { background: #fff3cd; color: #856404; padding: 8px 15px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: inline-block; }
        
        mark { background: #ffe6b3; padding: 0 3px; border-radius: 3px; }
        
        .footer { text-align: center; padding: 30px; color: #6c7a8a; border-top: 1px solid #eef2f6; margin-top: 40px; font-size: 13px; }
        
        @media (max-width: 768px) {
            .header, .search-container { padding: 12px 20px; }
            .search-wrapper { flex-direction: column; border-radius: 30px; }
            .search-input-group { flex-direction: column; width: 100%; }
            .search-field { width: 100%; }
            .divider { display: none; }
            .search-btn { width: 100%; justify-content: center; margin: 10px; }
            .main-content { padding: 0 20px; flex-direction: column; }
            .event-card { flex-direction: column; }
            .event-card-image { width: 100%; height: 160px; }
            .event-card-content { flex-direction: column; text-align: center; }
            .event-meta { justify-content: center; }
            .btn-ticket { width: 100%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" onclick="window.location.href='index.html'">
        <i class="fas fa-ticket-alt"></i> ticketmaster
    </div>
    <div id="auth-area"></div>
</div>

<div class="search-section">
    <div class="search-container">
        <div class="search-wrapper">
            <div class="search-input-group">
                <div class="search-field">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="locationInput" placeholder="City or Zip Code">
                </div>
                <div class="divider"></div>
                <div class="search-field">
                    <i class="far fa-calendar-alt"></i>
                    <select id="dateSelect">
                        <option value="">All Dates</option>
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="upcoming">Upcoming</option>
                    </select>
                </div>
                <div class="divider"></div>
                <div class="search-field">
                    <i class="fas fa-search"></i>
                    <input type="text" id="keywordInput" placeholder="Artist, Team or Event" autocomplete="off">
                </div>
            </div>
            <button class="search-btn" onclick="searchEvents(0)">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="sidebar">
        <div class="suggestions-card">
            <div class="suggestions-title">
                <i class="fas fa-chart-line"></i>
                <span>Top Suggestions</span>
            </div>
            <div id="suggestionsList">
                <div class="text-muted small">Start typing to see suggestions...</div>
            </div>
        </div>
        <div class="ad-card">
            <i class="fas fa-hotel"></i>
            <h6>Save up to 57%</h6>
            <small class="text-muted">Bundle your ticket with a hotel</small>
        </div>
    </div>

    <div class="results-area">
        <div class="results-header">
            <div class="result-count" id="resultCount">0 events found</div>
            <div class="sort-box">
                <span>Sort by:</span>
                <select id="sortSelect" class="sort-select">
                    <option value="relevance">Relevance</option>
                    <option value="date">Date</option>
                    <option value="price">Price</option>
                </select>
            </div>
        </div>
        <div id="filterWarning" class="filter-warning" style="display: none;"></div>
        <div id="eventsContainer">
            <div class="loading-container">
                <div class="spinner-custom"></div>
                <p>Enter a keyword to search for events</p>
            </div>
        </div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<div class="footer">
    <i class="fas fa-shield-alt me-1"></i> Safe & secure tickets · 100% buyer guarantee
</div>

<script>
const API_BASE = "http://localhost:8082";
const DEFAULT_IMAGE = 'https://images.unsplash.com/photo-1459749411172-04bfb1be6b2a?w=140&h=140&fit=crop';
let currentUser = null;
let currentPage = 0;
let currentKeyword = "";
let totalPages = 0;
let searchDebounceTimer;
let filterWarningShown = false;

// ==================== MÃ CỜ CÁC NƯỚC ====================
function getFlagCode(teamName) {
    const flagMap = {
        'usa': 'us', 'mexico': 'mx', 'brazil': 'br', 'germany': 'de',
        'argentina': 'ar', 'france': 'fr', 'england': 'gb-eng', 'spain': 'es',
        'portugal': 'pt', 'netherlands': 'nl', 'italy': 'it', 'belgium': 'be',
        'japan': 'jp', 'south-korea': 'kr', 'austria': 'at'
    };
    return flagMap[teamName] || 'un';
}

// ==================== LẤY ẢNH HIỂN THỊ ====================
function getEventImage(event) {
    const imageUrl = event.image_url || event.imageUrl;
    
    const isComponent = imageUrl && 
                        !imageUrl.includes('/') && 
                        !imageUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i);
    
    if (isComponent) {
        const teamName = imageUrl.split('-')[0];
        const flagCode = getFlagCode(teamName);
        return `https://flagcdn.com/w160/${flagCode}.png`;
    }
    
    if (imageUrl && imageUrl.trim() !== '') return imageUrl;
    
    const category = event.category || 'CONCERT';
    const FALLBACK_IMAGES = {
        'CONCERT': 'https://images.unsplash.com/photo-1501618669935-18b6ecb13d6d?w=140&h=140&fit=crop',
        'SPORTS': 'https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=140&h=140&fit=crop',
        'THEATRE': 'https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=140&h=140&fit=crop',
        'FAMILY': 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=140&h=140&fit=crop',
        'COMEDY': 'https://images.unsplash.com/photo-1527224857830-43a7acc85260?w=140&h=140&fit=crop'
    };
    return FALLBACK_IMAGES[category] || DEFAULT_IMAGE;
}

// ==================== AUTH ====================
function loadCurrentUser() {
    const userStr = localStorage.getItem("user");
    if (userStr) {
        try { currentUser = JSON.parse(userStr); } catch(e) { currentUser = null; }
    }
    renderAuthUI();
}

function renderAuthUI() {
    const area = document.getElementById("auth-area");
    if (currentUser && currentUser.username) {
        const isAdmin = currentUser.role === "ROLE_ADMIN";
        let avatarUrl = currentUser.avatar;
        if (!avatarUrl || avatarUrl === "https://i.pravatar.cc/150") {
            avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}`;
        }
        area.innerHTML = `
            <div class="user-menu" onclick="toggleMenu(event)">
                <img src="${avatarUrl}" class="avatar-sm" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}'">
                <span>${escapeHtml(currentUser.username)}</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div id="dropdownMenu" class="dropdown-menu-custom">
                <div class="menu-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i> My Profile</div>
                <div class="menu-item" onclick="window.location.href='my-tickets.html'"><i class="fas fa-ticket-alt"></i> My Tickets</div>
                ${isAdmin ? `<div class="menu-item" onclick="window.location.href='admin-dashboard.html'"><i class="fas fa-crown"></i> Admin Panel</div>` : ''}
                <div class="menu-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        `;
    } else {
        area.innerHTML = `<a href="login.html" class="btn btn-outline-light btn-sm">Sign In</a>`;
    }
}

function toggleMenu(e) { e.stopPropagation(); const m = document.getElementById("dropdownMenu"); if(m) m.style.display = m.style.display === "block" ? "none" : "block"; }
function logout() { localStorage.removeItem("user"); window.location.href = "login.html"; }
document.addEventListener("click", () => { const m = document.getElementById("dropdownMenu"); if(m) m.style.display = "none"; });

// ==================== UTILITIES ====================
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function highlightText(text, keyword) {
    if (!keyword || !text) return text;
    try {
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return String(text).replace(regex, '<mark>$1</mark>');
    } catch(e) { return text; }
}

function getDateRangeFromFilter(filter) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let fromDate = null;
    let toDate = null;
    
    switch(filter) {
        case 'today':
            fromDate = today;
            toDate = new Date(today.getTime() + 24 * 60 * 60 * 1000);
            break;
        case 'week':
            fromDate = today;
            toDate = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
            break;
        case 'month':
            fromDate = today;
            toDate = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);
            break;
        case 'upcoming':
            fromDate = today;
            toDate = new Date(today.getTime() + 365 * 24 * 60 * 60 * 1000);
            break;
        default:
            fromDate = null;
            toDate = null;
    }
    return { fromDate, toDate };
}

// ==================== SEARCH ====================
const keywordInput = document.getElementById("keywordInput");
const locationInput = document.getElementById("locationInput");
const dateSelect = document.getElementById("dateSelect");
const sortSelect = document.getElementById("sortSelect");
const eventsContainer = document.getElementById("eventsContainer");
const resultCountSpan = document.getElementById("resultCount");
const paginationDiv = document.getElementById("pagination");
const filterWarning = document.getElementById("filterWarning");

async function searchEvents(page = 0) {
    currentPage = page;
    currentKeyword = keywordInput.value.trim();
    const location = locationInput.value.trim();
    const dateFilter = dateSelect.value;
    filterWarningShown = false;
    filterWarning.style.display = "none";
    
    if (!currentKeyword && !location) {
        eventsContainer.innerHTML = `<div class="loading-container"><i class="fas fa-search fa-3x text-muted mb-3"></i><h5>Enter a keyword to search</h5><p class="text-muted">Search for concerts, sports, theatre and more</p></div>`;
        resultCountSpan.innerHTML = "0 events found";
        paginationDiv.innerHTML = "";
        return;
    }
    
    eventsContainer.innerHTML = `<div class="loading-container"><div class="spinner-custom"></div><p>Searching for "${escapeHtml(currentKeyword || location)}"...</p></div>`;
    
    try {
        let url = `${API_BASE}/events/search?keyword=${encodeURIComponent(currentKeyword)}&page=${page}&size=20`;
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error("Search failed");
        }
        
        const data = await response.json();
        let events = data.content || [];
        totalPages = data.totalPages || 0;
        
        // Client-side filtering for location
        if (location && events.length > 0) {
            const locationLower = location.toLowerCase();
            const originalCount = events.length;
            events = events.filter(event => {
                const eventLocation = (event.location || event.venue || "").toLowerCase();
                return eventLocation.includes(locationLower);
            });
            if (originalCount !== events.length && !filterWarningShown) {
                filterWarning.innerHTML = '<i class="fas fa-info-circle me-1"></i> Location filter applied locally. Results may be limited.';
                filterWarning.style.display = "block";
                filterWarningShown = true;
            }
        }
        
        // Client-side filtering for date
        const { fromDate, toDate } = getDateRangeFromFilter(dateFilter);
        if (fromDate && toDate && events.length > 0) {
            const originalCount = events.length;
            events = events.filter(event => {
                if (!event.eventTime) return false;
                const eventDate = new Date(event.eventTime);
                return eventDate >= fromDate && eventDate <= toDate;
            });
            if (originalCount !== events.length && !filterWarningShown) {
                filterWarning.innerHTML = '<i class="fas fa-info-circle me-1"></i> Date filter applied locally. Results may be limited.';
                filterWarning.style.display = "block";
                filterWarningShown = true;
            }
        }
        
        // Sort events
        const sortBy = sortSelect.value;
        if (sortBy === 'date') {
            events.sort((a, b) => new Date(a.eventTime) - new Date(b.eventTime));
        } else if (sortBy === 'price') {
            events.sort((a, b) => (a.minPrice || 0) - (b.minPrice || 0));
        }
        
        resultCountSpan.innerHTML = `${events.length} ${events.length === 1 ? 'event' : 'events'} found for "${escapeHtml(currentKeyword || location)}"`;
        
        if (events.length === 0) {
            eventsContainer.innerHTML = `
                <div class="no-results">
                    <i class="far fa-frown"></i>
                    <h5>No events found</h5>
                    <p class="text-muted">Try different keywords or check your spelling</p>
                </div>
            `;
            paginationDiv.innerHTML = "";
            return;
        }
        
        renderEvents(events);
        renderPagination();
        fetchSuggestions(currentKeyword);
        
    } catch (error) {
        console.error("Search error:", error);
        eventsContainer.innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><h5>Connection Error</h5><p>Cannot connect to server. Please make sure backend is running at ${API_BASE}</p></div>`;
    }
}

function renderEvents(events) {
    let html = '';
    events.forEach(event => {
        const eventDate = event.eventTime ? new Date(event.eventTime).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : 'Date TBA';
        const highlightedName = highlightText(event.name, currentKeyword);
        const imageUrl = getEventImage(event);
        
        html += `
            <div class="event-card" onclick="viewEvent(${event.id})">
                <img src="${imageUrl}" class="event-card-image" alt="${escapeHtml(event.name)}" onerror="this.src='${DEFAULT_IMAGE}'">
                <div class="event-card-content">
                    <div class="event-info">
                        <div class="event-title">${highlightedName}</div>
                        <div class="event-venue">
                            <i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location || 'Location TBA')}
                        </div>
                        <div class="event-meta">
                            <span><i class="far fa-calendar-alt"></i> ${eventDate}</span>
                            <span><i class="fas fa-tag"></i> ${event.category || 'Event'}</span>
                        </div>
                        <div class="event-price">
                            From $${event.minPrice || 50}
                        </div>
                    </div>
                    <button class="btn-ticket" onclick="event.stopPropagation(); viewEvent(${event.id})">
                        Find Tickets <i class="fas fa-arrow-right ms-1"></i>
                    </button>
                </div>
            </div>
        `;
    });
    eventsContainer.innerHTML = html;
}

function renderPagination() {
    if (totalPages <= 1) {
        paginationDiv.innerHTML = "";
        return;
    }
    
    let html = `<div class="pagination">`;
    
    if (currentPage > 0) {
        html += `<button class="page-btn" onclick="searchEvents(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
    }
    
    const maxVisible = 5;
    let startPage = Math.max(0, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages - 1, startPage + maxVisible - 1);
    
    if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(0, endPage - maxVisible + 1);
    }
    
    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="searchEvents(${i})">${i + 1}</button>`;
    }
    
    if (currentPage < totalPages - 1) {
        html += `<button class="page-btn" onclick="searchEvents(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
    }
    
    html += `</div>`;
    paginationDiv.innerHTML = html;
}

async function fetchSuggestions(keyword) {
    if (!keyword.trim()) {
        document.getElementById("suggestionsList").innerHTML = '<div class="text-muted small">Start typing to see suggestions...</div>';
        return;
    }
    
    try {
        const response = await fetch(`${API_BASE}/events/suggest?keyword=${encodeURIComponent(keyword)}`);
        if (!response.ok) return;
        
        const suggestions = await response.json();
        if (!suggestions.length) {
            document.getElementById("suggestionsList").innerHTML = '<div class="text-muted small">No suggestions found</div>';
            return;
        }
        
        let html = '';
        suggestions.slice(0, 6).forEach(s => {
            html += `<div class="suggestion-item" onclick="quickSearch('${escapeHtml(s.name)}')">
                        <i class="fas fa-search"></i> ${escapeHtml(s.name)}
                    </div>`;
        });
        document.getElementById("suggestionsList").innerHTML = html;
        
    } catch(e) {
        console.error("Suggestions error:", e);
    }
}

function quickSearch(term) {
    keywordInput.value = term;
    searchEvents(0);
}

function viewEvent(id) {
    window.location.href = `event-detail.html?id=${id}`;
}

// ==================== EVENT LISTENERS ====================
keywordInput.addEventListener("input", function(e) {
    clearTimeout(searchDebounceTimer);
    const keyword = e.target.value.trim();
    
    if (keyword) {
        fetchSuggestions(keyword);
        searchDebounceTimer = setTimeout(() => searchEvents(0), 500);
    } else {
        document.getElementById("suggestionsList").innerHTML = '<div class="text-muted small">Start typing to see suggestions...</div>';
        searchDebounceTimer = setTimeout(() => searchEvents(0), 200);
    }
});

locationInput.addEventListener("input", function() {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => searchEvents(0), 500);
});

dateSelect.addEventListener("change", function() {
    searchEvents(0);
});

sortSelect.addEventListener("change", function() {
    searchEvents(currentPage);
});

keywordInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") searchEvents(0);
});

// ==================== INIT ====================
window.addEventListener("DOMContentLoaded", () => {
    loadCurrentUser();
    
    const urlParams = new URLSearchParams(window.location.search);
    const keywordParam = urlParams.get("keyword");
    
    if (keywordParam) {
        keywordInput.value = keywordParam;
        searchEvents(0);
    } else {
        eventsContainer.innerHTML = `<div class="loading-container"><i class="fas fa-search fa-3x text-muted mb-3"></i><h5>Find your next event</h5><p class="text-muted">Enter a keyword to search for concerts, sports, theatre and more</p></div>`;
        resultCountSpan.innerHTML = "0 events found";
    }
});
</script>
