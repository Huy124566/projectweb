<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - Ticket Rush</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    body { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh; 
        font-family: 'Inter', sans-serif;
    }
    .card-box { 
        border-radius: 20px; 
        border: none; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        background: rgba(255,255,255,0.95);
    }
    .title { 
        color: #0d5bd7; 
        font-weight: 700; 
    }
    .btn-register { 
        background: #0d5bd7; 
        border: none; 
        padding: 12px; 
        font-weight: 600; 
        border-radius: 50px;
        transition: all 0.3s ease;
    }
    .btn-register:hover {
        background: #0a4ab3;
        transform: translateY(-2px);
    }
    .btn-otp {
        background: #28a745;
        border: none;
        padding: 10px;
        font-weight: 600;
        border-radius: 50px;
        transition: all 0.3s ease;
    }
    .btn-otp:hover {
        background: #218838;
        transform: translateY(-2px);
    }
    .form-control, .form-select {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #e0e0e0;
    }
    .form-control:focus, .form-select:focus {
        box-shadow: none;
        border-color: #0d5bd7;
    }
    .input-group-text {
        background: #f0f0f0;
        border: none;
        border-radius: 10px 0 0 10px;
    }
    .alert-custom {
        border-radius: 10px;
        font-size: 14px;
    }
    .step {
        display: none;
    }
    .step.active {
        display: block;
    }
    .step-indicator {
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
        position: relative;
    }
    .step-indicator::before {
        content: '';
        position: absolute;
        top: 20px;
        left: 10%;
        width: 80%;
        height: 2px;
        background: #e0e0e0;
        z-index: 0;
    }
    .step-circle {
        width: 40px;
        height: 40px;
        background: #f0f0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        position: relative;
        z-index: 1;
        background: white;
        border: 2px solid #dee2e6;
    }
    .step-circle.active {
        background: #0d5bd7;
        border-color: #0d5bd7;
        color: white;
    }
    .step-circle.completed {
        background: #28a745;
        border-color: #28a745;
        color: white;
    }
    .step-label {
        font-size: 12px;
        margin-top: 8px;
        text-align: center;
    }
</style>
</head>
<body>
<div class="container mt-4">
    <div class="col-md-5 mx-auto">
        <div class="card p-4 card-box">
            <div class="text-center mb-3">
                <i class="fas fa-ticket-alt fa-3x" style="color:#0d5bd7;"></i>
                <h3 class="title mt-2">Create Account</h3>
                <p class="text-muted">Verify your email with OTP</p>
            </div>
            
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="text-center">
                    <div id="step1Circle" class="step-circle active">1</div>
                    <div class="step-label">Information</div>
                </div>
                <div class="text-center">
                    <div id="step2Circle" class="step-circle">2</div>
                    <div class="step-label">Verify OTP</div>
                </div>
            </div>
            
            <!-- Alert box -->
            <div id="alertBox" class="alert alert-custom d-none" role="alert"></div>
            
            <!-- Step 1: Form đăng ký -->
            <div id="step1" class="step active">
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input id="username" class="form-control" placeholder="Username">
                </div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input id="email" type="email" class="form-control" placeholder="Email address">
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <select id="gender" class="form-select">
                            <option value="">Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input id="dob" type="date" class="form-control" placeholder="Date of Birth">
                    </div>
                </div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input id="password" type="password" class="form-control" placeholder="Password (min 6 chars)">
                </div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                    <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm Password">
                </div>
                
                <button onclick="sendOTP()" class="btn btn-primary w-100 btn-register">
                    <i class="fas fa-paper-plane me-2"></i>Send OTP
                </button>
            </div>
            
            <!-- Step 2: Xác thực OTP -->
            <div id="step2" class="step">
                <p class="text-muted text-center mb-3">
                    <i class="fas fa-envelope"></i> OTP sent to <strong id="showEmail"></strong>
                </p>
                
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input id="otpCode" class="form-control" placeholder="Enter 6-digit OTP code" maxlength="6">
                </div>
                
                <button onclick="verifyOTP()" class="btn btn-success w-100 btn-otp mb-2">
                    <i class="fas fa-check-circle me-2"></i>Verify & Register
                </button>
                
                <button onclick="resendOTP()" class="btn btn-outline-secondary w-100">
                    <i class="fas fa-redo me-2"></i>Resend OTP
                </button>
                
                <p class="text-center mt-3">
                    <a href="login.html">← Back to Login</a>
                </p>
            </div>
            
            <p class="text-center mt-3 mb-0">
                Already have account? <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
let tempEmail = "";
let tempUsername = "";
let tempGender = "";
let tempDob = "";
let tempPassword = "";

function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.textContent = message;
    alertBox.className = `alert alert-custom alert-${type}`;
    alertBox.classList.remove('d-none');
    setTimeout(() => {
        alertBox.classList.add('d-none');
    }, 4000);
}

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function sendOTP() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const gender = document.getElementById("gender").value;
    const dob = document.getElementById("dob").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    
    // Validation
    if (!username || !email || !gender || !dob || !password || !confirm) {
        showAlert("Please fill all fields", "danger");
        return;
    }
    
    if (!isValidEmail(email)) {
        showAlert("Please enter a valid email address", "danger");
        return;
    }
    
    if (password.length < 6) {
        showAlert("Password must be at least 6 characters", "danger");
        return;
    }
    
    if (password !== confirm) {
        showAlert("Passwords do not match", "danger");
        return;
    }
    
    // Lưu tạm dữ liệu
    tempEmail = email;
    tempUsername = username;
    tempGender = gender;
    tempDob = dob;
    tempPassword = password;
    
    // Gửi OTP
    fetch(`${API_BASE}/auth/send-otp`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        showAlert(`✅ OTP sent to ${email}`, "success");
        document.getElementById("showEmail").innerText = email;
        
        // Chuyển sang step 2
        document.getElementById("step1").classList.remove("active");
        document.getElementById("step2").classList.add("active");
        
        // Cập nhật step indicator
        document.getElementById("step1Circle").classList.remove("active");
        document.getElementById("step1Circle").classList.add("completed");
        document.getElementById("step2Circle").classList.add("active");
    })
    .catch(err => {
        showAlert(err.message, "danger");
    });
}

function verifyOTP() {
    const otp = document.getElementById("otpCode").value.trim();
    
    if (!otp || otp.length !== 6) {
        showAlert("Please enter 6-digit OTP code", "danger");
        return;
    }
    
    fetch(`${API_BASE}/auth/register-otp`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: tempEmail,
            otp: otp,
            username: tempUsername,
            password: tempPassword,
            gender: tempGender,
            dateOfBirth: tempDob
        })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        showAlert("✅ Registration successful! Redirecting to login...", "success");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1500);
    })
    .catch(err => {
        showAlert(err.message, "danger");
    });
}

function resendOTP() {
    fetch(`${API_BASE}/auth/resend-otp`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: tempEmail })
    })
    .then(async res => {
        if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg);
        }
        return res.json();
    })
    .then(() => {
        showAlert(`✅ New OTP sent to ${tempEmail}`, "success");
    })
    .catch(err => {
        showAlert(err.message, "danger");
    });
}

// Enter key hỗ trợ
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendOTP();
});
document.getElementById("otpCode").addEventListener("keypress", function(e) {
    if (e.key === "Enter") verifyOTP();
});
</script>
</body>
</html>
