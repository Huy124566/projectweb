spring.application.name=Ticket_Rush

# DATABASE CONFIGURATION
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?serverTimezone=Asia/Ho_Chi_Minh&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=LOCAL&forceConnectionTimeZoneToSession=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JACKSON CONFIGURATION
spring.jackson.serialization.write-dates-as-timestamps=false

# SERVER CONFIGURATION
server.port=${PORT:8082}

# RESEND API CONFIGURATION
# Mapping the Railway variable to the key used in ResendEmailService.java
resend.api.key=${SPRING_MAIL_PASSWORD}

# STATIC RESOURCES
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# LOGGING
logging.level.com.example.Ticket_Rush=DEBUG