spring.application.name=Ticket_Rush

# ========== DATABASE ==========
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ticketrush_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:02082003}

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.isolation=2

# ========== JACKSON ==========
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jpa.open-in-view=false

# ========== SERVER ==========
server.port=${PORT:8082}

# ========== EMAIL ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=huy01674188280@gmail.com
# spring.mail.password=jjgj rrsw zdxo czxn
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========== LOGGING ==========
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG

# ========== STATIC RESOURCES ==========
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
